<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="value" id="computerScore">0</span>
            </div>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <p>Controls:</p>
            <ul>
                <li>↑ / ↓ Arrow Keys or Mouse to move left paddle</li>
                <li>First to 11 points wins!</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
